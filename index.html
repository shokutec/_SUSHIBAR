<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoku Tecnológico</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html {
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    #video-background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.45);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      gap: 50px; /* espacio entre MENU y el botón de experiencia */
    }

    .instagram {
      position: absolute;
      top: 25px;
      left: 25px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid white;
      background: rgba(0,0,0,0.3);
    }

    .instagram img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Botón MENU - grande y centrado */
    .menu-btn {
      font-size: 3.8rem;
      font-weight: bold;
      letter-spacing: 8px;
      text-transform: uppercase;
      padding: 25px 90px;
      background: rgba(0, 0, 0, 0.5);
      border: 3px solid white;
      border-radius: 20px;
      cursor: pointer;
      color: white;
      text-decoration: none;
      text-align: center;
    }

    /* Botón CUÉNTANOS TU EXPERIENCIA - abajo del MENU */
    .experience-btn {
      font-size: 1.7rem;
      font-weight: bold;
      padding: 15px 50px;
      background: rgba(0, 0, 0, 0.5);
      border: 3px solid white;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <video id="video-background" autoplay loop muted playsinline>
    <source src="fondo.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <!-- Instagram -->
    <a href="https://www.instagram.com/shoku_tecnologico?igsh=MWo4anlmaHUxeGFnNQ==" target="_blank" class="instagram">
      <img src="ig.png" alt="Instagram Shoku">
    </a>

    <!-- Botones separados: MENU en medio y experiencia abajo -->
    <a href="menu.html" class="menu-btn">MENU</a>
    
    <a href="https://maps.app.goo.gl/tYC4FADQPSR65c1r5" target="_blank" class="experience-btn">
      CUÉNTANOS TU EXPERIENCIA
    </a>
  </div>

</body>
</html>
